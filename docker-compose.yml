version: '3.8'

services:
  php74:
    build:
      context: ./php
      args:
        PHP_VERSION: "7.4"
    container_name: php74
    user: www
    volumes:
      - ./www:/var/www/html:cached
    environment:
      PHP_MAX_EXECUTION_TIME: 3000
      PHP_MEMORY_LIMIT: 2048M
      PHP_UPLOAD_MAX_FILESIZE: 100M
      PHP_POST_MAX_SIZE: 100M
      PHP_MAX_INPUT_VARS: 30000
      PHP_OPCACHE_ENABLE: 1
      PHP_OPCACHE_MEMORY_CONSUMPTION: 256
      PHP_OPCACHE_MAX_ACCELERATED_FILES: 20000
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
      PHP_OPCACHE_REVALIDATE_FREQ: 2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - webnet
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  php82:
    build:
      context: ./php
      args:
        PHP_VERSION: "8.2"
    container_name: php82
    user: www
    volumes:
      - ./www:/var/www/html:cached
    environment:
      PHP_MAX_EXECUTION_TIME: 3000
      PHP_MEMORY_LIMIT: 2048M
      PHP_UPLOAD_MAX_FILESIZE: 100M
      PHP_POST_MAX_SIZE: 100M
      PHP_MAX_INPUT_VARS: 30000
      PHP_OPCACHE_ENABLE: 1
      PHP_OPCACHE_MEMORY_CONSUMPTION: 256
      PHP_OPCACHE_MAX_ACCELERATED_FILES: 20000
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
      PHP_OPCACHE_REVALIDATE_FREQ: 2
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SECURE: ${SMTP_SECURE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - webnet
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "8090:8090"
    volumes:
      - ./www:/var/www/html:cached
      - ./nginx/conf.d:/etc/nginx/conf.d:cached
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - webnet
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      php74:
        condition: service_healthy
      php82:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pamp_node:
    image: node:18-alpine
    container_name: pamp_node
    ports:
      - "3000:3000"
    working_dir: /usr/src/app
    volumes:
      - ./www/pamp:/usr/src/app:cached
      - pamp_node_node_modules:/usr/src/app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      WATCHPACK_POLLING: 'true'
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- -H 0.0.0.0"
    networks:
      - webnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  intx_node:
    image: node:20-slim
    container_name: intx_node
    ports:
      - "3001:3000"
    working_dir: /usr/src/app
    volumes:
      - ./www/intx-nextjs:/usr/src/app:cached
      - intx_node_node_modules:/usr/src/app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      WATCHPACK_POLLING: 'true'
    command: >
      sh -c "
      npm install --legacy-peer-deps &&
      if [ \"$$NODE_ENV\" = \"production\" ]; then
        npm run build &&
        npm run start -- -H 0.0.0.0
      else
        npm run dev -- -H 0.0.0.0
      fi
      "
    networks:
      - webnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mariadb:10.11-jammy
    container_name: mariadb
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql/data:/var/lib/mysql:delegated
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - webnet
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=1G
      --innodb-log-file-size=256M
      --max-connections=500
      --query-cache-size=0
      --query-cache-type=0
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pamp_node_node_modules:
  intx_node_node_modules:

networks:
  webnet:
    driver: bridge
