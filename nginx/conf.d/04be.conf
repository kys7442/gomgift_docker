server {
    listen 80;
    server_name test.04be.local;

    root /var/www/html/04be/public;
    index index.php;

    access_log /var/log/nginx/04be-access.log;
    error_log  /var/log/nginx/04be-error.log;

    client_max_body_size 100M;

    # .env 파일 차단
    location ~* (^|/)\.env(\..*)?$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # 숨김 파일 차단
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # vendor 디렉토리 차단
    location ~ ^/vendor {
        deny all;
        return 404;
    }

    # 정적 파일 (CSS, JS, 이미지)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # 모든 요청을 프론트 컨트롤러로
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM 처리
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_pass php82:9000;
        fastcgi_read_timeout 300s;
    }
}
