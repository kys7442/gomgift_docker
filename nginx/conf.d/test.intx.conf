server {
    listen 80;
    server_name test.intx.com 192.168.0.8;

    root /var/www/html/intx;
    index index.php index.html index.htm;

    access_log /var/log/nginx/test.intx.access.log;
    error_log /var/log/nginx/test.intx.error.log;

    # === 그누보드 관리자 (기존 유지) ===
    location /adm {
        try_files $uri $uri/ /adm/index.php?$args;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php74:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 3000s;
            fastcgi_read_timeout 3000s;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 8 128k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_keep_conn on;
        }
    }

    # === 기존 API (모바일앱 호환 유지) ===
    location /api {
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php74:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 3000s;
            fastcgi_read_timeout 3000s;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 8 128k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_keep_conn on;
        }
    }

    # === 그누보드 BBS (관리자에서 참조) ===
    location /bbs {
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php74:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 3000s;
            fastcgi_read_timeout 3000s;
            fastcgi_keep_conn on;
        }
    }

    # === data 디렉토리 (업로드 파일 서빙, PHP 실행 차단) ===
    location /data {
        location ~ \.php$ {
            deny all;
        }
    }

    # === 정적 에셋 (CSS/JS/이미지 직접 서빙) ===
    location /app/public/assets {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # === 보안: MVC 내부 디렉토리 직접 접근 차단 ===
    location ~ ^/app/(Core|Controllers|Models|Views|Middleware|bootstrap\.php) {
        deny all;
    }

    # === 기존 테마/스킨/이미지/JS/CSS (정적 파일) ===
    location /theme { try_files $uri =404; }
    location /skin { try_files $uri =404; }
    location /img { try_files $uri =404; }
    location /css { try_files $uri =404; }
    location /js { try_files $uri =404; }
    location /plugin { try_files $uri =404; }

    # === 나머지 모든 요청 → MVC Front Controller ===
    location / {
        # 정적 파일이 실제로 존재하면 서빙, 그 외는 모두 MVC로
        # index 지시어를 비워서 루트 index.php(그누보드) 자동 매칭 방지
        index _nonexistent_;
        try_files $uri /app/public/index.php?$args;
    }

    # === MVC Front Controller PHP 처리 ===
    location ~ ^/app/public/index\.php$ {
        include fastcgi_params;
        fastcgi_pass php74:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 3000s;
        fastcgi_read_timeout 3000s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_keep_conn on;
    }

    # === 기타 PHP 파일 (그누보드 루트 common.php 등) ===
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php74:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 3000s;
        fastcgi_read_timeout 3000s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_keep_conn on;
    }

    # === 보안: .ht 파일 접근 차단 ===
    location ~ /\.ht {
        deny all;
    }

    # === 보안 헤더 ===
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
