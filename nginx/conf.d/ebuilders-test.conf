server {
    listen 80;
    server_name test.e-builders.com;

    access_log /var/log/nginx/ebuilders-test-access.log;
    error_log  /var/log/nginx/ebuilders-test-error.log;

    # DNS resolver 설정 (시작 시점이 아닌 런타임에 upstream 해석)
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    client_max_body_size 100M;

    proxy_connect_timeout 60s;
    proxy_send_timeout 3000s;
    proxy_read_timeout 3000s;
    send_timeout 3000s;

    proxy_http_version 1.1;

    # Next.js HMR (WebSocket)
    location /_next/webpack-hmr {
        set $ebuilders_dev "http://host.docker.internal:3030";
        proxy_pass $ebuilders_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js 정적 파일
    location /_next/ {
        set $ebuilders_dev "http://host.docker.internal:3030";
        proxy_pass $ebuilders_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 모든 요청을 Next.js dev 서버(호스트)로 프록시
    location / {
        set $ebuilders_dev "http://host.docker.internal:3030";
        proxy_pass $ebuilders_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}
