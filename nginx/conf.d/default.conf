# [2026-04-24] 로컬 개발용 HTTPS — Web Push Secure Context 요구 충족
server {
    listen 443 ssl;
    http2 on;
    server_name test.gomgift.com localhost;

    ssl_certificate     /etc/nginx/certs/test.gomgift.com.crt;
    ssl_certificate_key /etc/nginx/certs/test.gomgift.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    root /var/www/html/yc_gomgift;
    index index.php index.html index.htm;

    access_log /var/log/nginx/access.ssl.log;
    error_log  /var/log/nginx/error.ssl.log;

    client_max_body_size 50m;
    client_body_buffer_size 256k;

    # Service Worker 캐시 방지 (중요 — 업데이트 반영 보장)
    location ~* ^/adm/sw\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # WebSocket 프록시 (HTTPS → wss)
    location /ws {
        proxy_pass http://host.docker.internal:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        proxy_buffering off;
        proxy_cache off;
    }

    # SmartEditor2 업로더 (HTTP 블록과 동일)
    location ~ ^/plugin/editor/smarteditor2/photo_uploader/popup/php/?$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$uri/index.php;
        fastcgi_param HTTPS on;
        fastcgi_pass php82:9000;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 256k;
        fastcgi_buffer_size 256k;
    }

    location ~ ^/plugin/editor/smarteditor2/photo_uploader/.*\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_pass php82:9000;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 256k;
        fastcgi_buffer_size 256k;
    }

    location /plugin/editor/smarteditor2/photo_uploader/ {
        try_files $uri $uri/ =404;
        expires 30d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /sitemap.xml { rewrite ^ /sitemap.php last; }

    location = /robots.txt {
        root  /var/www/html/yc_gomgift;
        default_type text/plain;
        try_files /robots.txt =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|otf|eot)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    location ~ ^/adm/.*\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_pass php82:9000;
        fastcgi_buffers 32 32k;
        fastcgi_buffer_size 64k;
        fastcgi_busy_buffers_size 96k;
        fastcgi_temp_file_write_size 96k;
        fastcgi_read_timeout 120;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php82:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 3000s;
        fastcgi_read_timeout 3000s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_keep_conn on;
    }

    location ~ /\.ht { deny all; }
}

server {
    listen 80 default_server;
    server_name test.gomgift.com 192.168.0.24;

    root /var/www/html/yc_gomgift;
    index index.php index.html index.htm;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # 업로드/버퍼 설정 (실서버와 유사하게)
    client_max_body_size 50m;
    client_body_buffer_size 256k;

    # SmartEditor2 업로더 (실서버 설정 반영)
    location ~ ^/plugin/editor/smarteditor2/photo_uploader/popup/php/?$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$uri/index.php;
        fastcgi_pass php82:9000;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 256k;
        fastcgi_buffer_size 256k;
    }

    location ~ ^/plugin/editor/smarteditor2/photo_uploader/.*\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass php82:9000;
        fastcgi_request_buffering off;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 256k;
        fastcgi_buffer_size 256k;
    }

    location /plugin/editor/smarteditor2/photo_uploader/ {
        try_files $uri $uri/ =404;
        expires 30d;
        access_log off;
    }

    location /ws {
        proxy_pass http://localhost:8081;  # 변경!
        proxy_http_version 1.1;
        
        # WebSocket 업그레이드 필수
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 기본 헤더
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket은 장시간 연결이므로 타임아웃을 길게 설정
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # 버퍼링 비활성화 (WebSocket에 중요)
        proxy_buffering off;
        
        # 캐시 비활성화
        proxy_cache off;
    }

    # 기본 라우팅
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # sitemap.xml (실서버 설정 반영)
    location = /sitemap.xml {
        rewrite ^ /sitemap.php last;
    }

    # robots.txt (실서버 설정 반영)
    location = /robots.txt {
        root  /var/www/html/yc_gomgift;
        default_type text/plain;
        try_files /robots.txt =404;
    }

    # 정적 리소스 캐시 (실서버 설정 반영)
    location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|otf|eot)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    # (선택) 관리자 페이지 fastcgi 버퍼 완화
    location ~ ^/adm/.*\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass php82:9000;

        fastcgi_buffers 32 32k;
        fastcgi_buffer_size 64k;
        fastcgi_busy_buffers_size 96k;
        fastcgi_temp_file_write_size 96k;

        fastcgi_read_timeout 120;
        # fastcgi_buffering off;
        # fastcgi_max_temp_file_size 0;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php82:9000;  # 기본은 PHP 8.2 사용
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # PHP-FPM 타임아웃 설정
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 3000s;
        fastcgi_read_timeout 3000s;
        
        # 버퍼 설정 (성능 최적화)
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        
        # Keepalive 연결 재사용 (성능 향상)
        fastcgi_keep_conn on;
        
        # 캐시 설정 (기본값 사용)
        # fastcgi_cache_bypass $skip_cache;
        # fastcgi_no_cache $skip_cache;
    }

    location ~ /\.ht {
        deny all;
    }
}

